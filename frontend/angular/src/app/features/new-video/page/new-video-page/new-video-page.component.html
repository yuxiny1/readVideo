<header class="topbar">
  <div>
    <h1>readVideo</h1>
    <div class="meta-row">
      <span class="pill" [ngClass]="workflow.health() === '在线' ? 'ok' : workflow.health() === '离线' ? 'error' : 'muted'">
        {{ workflow.health() }}
      </span>
      <span class="pill muted">{{ workflow.backendLabel() }}</span>
    </div>
  </div>
</header>

<main class="workspace">
  <rv-process-panel
    [vm]="processPanelVm()"
    (formPatched)="patchForm($event)"
    (submitRequested)="workflow.startFromForm()"
    (whisperDownloadRequested)="models.downloadSelectedWhisperModel($event)"
    (strongestModelRequested)="models.loadOllamaModels(true)"
    (duplicateAction)="handleDuplicateAction($event)"
  />
  <rv-latest-output
    [vm]="latestOutputVm()"
    (favoriteRequested)="workflow.favoriteLatestSummary()"
    (copyRequested)="workflow.copyLatestOutput()"
    (refreshRequested)="workflow.loadRecentTasks()"
    (taskOpened)="workflow.openRecentTask($event)"
    (readerOpened)="openReader($event)"
  />
  <rv-saved-sources />
</main>

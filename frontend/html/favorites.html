<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>readVideo Favorites</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a class="brand-link" href="/">readVideo</a>
      <nav class="side-nav">
        <a class="side-link" href="/">New Video</a>
        <a class="side-link" href="/history">History</a>
        <a class="side-link active" href="/favorites">Favorites</a>
        <a class="side-link" href="/reader">Reader</a>
        <a class="side-link" href="/docs" target="_blank" rel="noreferrer">API Docs</a>
      </nav>
    </aside>

    <div class="page-content">
      <header class="topbar">
        <div>
          <h1>readVideo Favorites</h1>
          <div class="meta-row">
            <span id="favorites-count" class="pill muted">Loading</span>
          </div>
        </div>
      </header>

  <main class="favorites-workspace">
    <section class="tool-panel favorites-panel">
      <div class="panel-header">
        <h2>Favorite Summaries</h2>
        <button id="refresh-favorites" class="secondary-button small-button" type="button">Refresh</button>
      </div>
      <div class="search-row">
        <label for="favorite-search">Search Favorites</label>
        <input id="favorite-search" placeholder="Search title, summary, URL, folder, or Markdown path">
      </div>
      <div id="favorites-list" class="favorite-list"></div>
    </section>

    <aside class="favorites-side">
      <section class="tool-panel folder-panel">
        <div class="panel-header">
          <h2>Note Folders</h2>
          <div class="button-row">
            <span id="folder-count" class="caption">0 folders</span>
            <div class="actions-wrap">
              <button id="folder-actions-button" class="secondary-button small-button" type="button">Folder Actions</button>
              <div id="folder-actions-menu" class="actions-menu hidden">
                <button type="button" data-folder-action="new">New Folder</button>
                <button class="danger-text" type="button" data-folder-action="delete">Delete Selected Folder</button>
              </div>
            </div>
          </div>
        </div>

        <p id="folder-feedback" class="caption">Select a folder, then use Folder Actions.</p>

        <form id="favorite-folder-form" class="stack compact hidden">
          <div>
            <label for="favorite-folder-name">Folder Name</label>
            <input id="favorite-folder-name" required placeholder="Research, AI, Writing...">
          </div>
          <div>
            <label for="favorite-folder-notes">Notes</label>
            <textarea id="favorite-folder-notes" placeholder="What belongs here"></textarea>
          </div>
          <div class="button-row">
            <button class="secondary-button" type="submit">Create Folder</button>
            <button id="cancel-folder-form" class="secondary-button" type="button">Cancel</button>
          </div>
        </form>

        <div id="favorite-folders" class="folder-list"></div>
      </section>

      <section class="tool-panel files-panel">
        <div class="panel-header">
          <h2>Markdown Files</h2>
          <span id="md-count" class="caption">0 files</span>
        </div>

        <form id="md-folder-form" class="stack compact">
          <div>
            <label for="md-folder">Markdown Folder Path</label>
            <input id="md-folder" placeholder="notes">
          </div>
          <div class="button-row">
            <button class="secondary-button" type="submit">Load Folder</button>
            <button id="use-default-folder" class="secondary-button" type="button">Use Default</button>
          </div>
        </form>

        <div id="md-files" class="file-list"></div>
      </section>
    </aside>
  </main>
    </div>
  </div>

  <script type="module" src="/static/js/favorites.js"></script>
</body>
</html>
